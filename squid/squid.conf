# =============================================================================
# Squid Forward Proxy — Egress Domain Whitelist Enforcer
# =============================================================================
# Purpose: Acts as the ONLY exit point for n8n's outbound traffic.
#          Allows connections ONLY to domains listed in whitelist.acl.
#          All other destinations are DENIED with a 403.
# =============================================================================

# ── Ports ─────────────────────────────────────────────────────────────────────
http_port 3128

# ── Allowed Destination Ports (HTTPS=443, HTTP=80) ────────────────────────────
# Only allow standard web ports. Prevents port-scanning or weird tunnels.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# ── Deny non-standard ports immediately ───────────────────────────────────────
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ── Cachemgr access (localhost only) ──────────────────────────────────────────
http_access allow localhost manager
http_access deny manager

# ── Internal network that is allowed to USE this proxy ────────────────────────
# Only containers on the internal-net subnet (172.20.0.0/24) may use this proxy
acl internal_clients src 172.20.0.0/24
http_access deny !internal_clients

# ── Domain Whitelist ──────────────────────────────────────────────────────────
# Loaded from the separate whitelist.acl file (generated by update-whitelist.sh)
# Each line is a domain or .suffix pattern (leading dot = wildcard subdomain)
acl allowed_domains dstdomain "/etc/squid/whitelist.acl"

# ── ALLOW whitelisted domains, DENY everything else ───────────────────────────
http_access allow internal_clients allowed_domains
http_access deny all

# ── Deny CONNECT to anything not whitelisted ──────────────────────────────────
# (Belt-and-suspenders for HTTPS tunnels)
http_access deny CONNECT !allowed_domains

# ── Privacy: strip identifying headers ────────────────────────────────────────
# Remove headers that could leak internal info to external servers
request_header_access X-Forwarded-For deny all
request_header_access Via deny all
request_header_access Cache-Control deny all
forwarded_for delete
via off

# ── Cache settings ────────────────────────────────────────────────────────────
# Minimal cache — we're not a CDN, just a firewall proxy
cache_mem 32 MB
maximum_object_size 10 MB
cache_dir ufs /var/spool/squid 512 16 256

# ── Logging ───────────────────────────────────────────────────────────────────
# Log all requests (allowed and denied) for audit trail
access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log

# Log format: timestamp | result | client | method | url | status
logformat squid %tl.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt

# ── DNS ───────────────────────────────────────────────────────────────────────
# Use reliable public DNS (Squid runs on egress-net so it can reach these)
dns_nameservers 1.1.1.1 8.8.8.8

# ── Security hardening ────────────────────────────────────────────────────────
# Suppress Squid version from error pages and headers
httpd_suppress_version_string on
visible_hostname squid-proxy

# ── Timeouts ──────────────────────────────────────────────────────────────────
connect_timeout 30 seconds
read_timeout    120 seconds
request_timeout 120 seconds
